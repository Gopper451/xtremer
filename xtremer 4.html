<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeerChat – прямой чат с другом</title>
  <!-- PeerJS для WebRTC -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #0b0e14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      color: #e9edf2;
    }

    .app {
      max-width: 720px;
      width: 100%;
      background: rgba(18, 25, 35, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid #2a3645;
      border-radius: 36px;
      padding: 24px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a9c9ff, #b388ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subhead {
      color: #8b9bb5;
      margin-bottom: 24px;
      font-size: 0.95rem;
      border-left: 3px solid #3f5b8c;
      padding-left: 16px;
    }

    .status-card {
      background: #1a2533;
      border-radius: 24px;
      padding: 18px 20px;
      margin-bottom: 24px;
      border: 1px solid #2d3c4e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 20px;
      background: #5e6f8d;
    }
    .status-dot.online { background: #2dcb70; box-shadow: 0 0 12px #2dcb70; }
    .status-dot.connecting { background: #fbbf24; }

    .peer-id-box {
      background: #0f1722;
      border-radius: 60px;
      padding: 6px 18px;
      border: 1px solid #3f5b8c;
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      background: #2d3c4e;
      border: none;
      border-radius: 60px;
      padding: 12px 22px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #e9edf2;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #3f5b8c;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #4f46e5;
      border-color: #7c73f0;
      box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3);
    }
    .btn-primary:hover { background: #6366f1; transform: scale(1.02); }
    .btn:hover { background: #3f5b8c; }

    .connection-panel {
      background: #141e2a;
      border-radius: 28px;
      padding: 20px;
      margin-bottom: 24px;
      border: 1px solid #2d3c4e;
    }

    .invite-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .invite-input {
      flex: 1;
      background: #0f1722;
      border: 1px solid #2d3c4e;
      border-radius: 60px;
      padding: 14px 20px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .invite-input:focus { border-color: #7c73f0; }

    .chat-container {
      background: #101a24;
      border-radius: 28px;
      padding: 16px;
      border: 1px solid #2a3645;
    }

    .messages-box {
      height: 380px;
      overflow-y: auto;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 18px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }
    .message.in { align-items: flex-start; }
    .message.out { align-items: flex-end; margin-left: auto; }

    .bubble {
      padding: 12px 18px;
      border-radius: 24px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-break: break-word;
      background: #1f2c3a;
      color: #e9edf2;
    }
    .out .bubble { background: #4f46e5; color: white; }
    .in .bubble { border-bottom-left-radius: 8px; }
    .out .bubble { border-bottom-right-radius: 8px; }

    .msg-time {
      font-size: 0.7rem;
      color: #7e8ea8;
      margin-top: 5px;
      padding: 0 10px;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      background: #1f2c3a;
      border: 1px solid #2d3c4e;
      border-radius: 60px;
      padding: 16px 20px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .input-area input:focus { border-color: #7c73f0; }

    .empty-chat {
      text-align: center;
      color: #7e8ea8;
      padding: 30px 0;
    }

    .hidden { display: none !important; }

    .flex-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .copy-notice {
      background: #1e3a5f;
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="app">
  <h1>⧩ PeerChat</h1>
  <div class="subhead">прямое соединение · только ты и друг</div>

  <!-- Статус -->
  <div class="status-card">
    <div class="status-badge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Инициализация...</span>
    </div>
    <div class="peer-id-box">
      <span>🆔</span>
      <span id="myPeerIdDisplay">—</span>
      <button class="btn" id="copyLinkBtn" style="padding:6px 14px;">📋 копировать ссылку</button>
    </div>
  </div>

  <!-- Панель приглашения (видна всегда, но можно скрыть когда уже в чате) -->
  <div class="connection-panel" id="invitePanel">
    <div style="margin-bottom: 8px; font-weight:500;">🔗 Пригласи друга</div>
    <div class="invite-row">
      <input type="text" id="remoteIdInput" placeholder="Вставь ID или ссылку друга" class="invite-input">
      <button class="btn btn-primary" id="connectBtn">Подключиться</button>
    </div>
    <div class="flex-row" style="margin-top: 14px;">
      <button class="btn" id="copyInviteBtn">📎 Скопировать ссылку-приглашение</button>
      <button class="btn" id="resetConnectionBtn">🔄 Сбросить</button>
    </div>
    <p style="color:#7e8ea8; font-size:0.8rem; margin-top:12px;">Отправь другу ссылку — он подключится автоматически.</p>
  </div>

  <!-- Чат -->
  <div id="chatPanel" class="chat-container hidden">
    <div class="messages-box" id="messagesContainer">
      <div class="empty-chat">💬 Напишите что-нибудь...</div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
      <button class="btn btn-primary" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- DOM ----------
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const myPeerIdDisplay = document.getElementById('myPeerIdDisplay');
    const copyLinkBtn = document.getElementById('copyLinkBtn');
    const remoteIdInput = document.getElementById('remoteIdInput');
    const connectBtn = document.getElementById('connectBtn');
    const copyInviteBtn = document.getElementById('copyInviteBtn');
    const resetConnectionBtn = document.getElementById('resetConnectionBtn');
    const invitePanel = document.getElementById('invitePanel');
    const chatPanel = document.getElementById('chatPanel');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    // ---------- Переменные ----------
    let peer = null;
    let conn = null;
    let myPeerId = null;
    let connected = false;

    // Локальное хранилище сообщений
    let chatHistory = [];

    // ---------- Инициализация PeerJS ----------
    function initPeer() {
      if (peer) peer.destroy();
      peer = new Peer();  // случайный ID

      peer.on('open', (id) => {
        myPeerId = id;
        myPeerIdDisplay.textContent = id;
        updateStatus('waiting', 'Ожидаем друга...');
        // Проверяем, есть ли peer id в URL (если перешли по ссылке)
        const urlParams = new URLSearchParams(window.location.search);
        const remoteFromUrl = urlParams.get('peer');
        if (remoteFromUrl && remoteFromId !== myPeerId) {
          remoteIdInput.value = remoteFromUrl;
          connectToPeer(remoteFromUrl);
        }
      });

      peer.on('connection', (connection) => {
        // Входящее соединение
        conn = connection;
        setupConnectionHandlers();
        updateStatus('connected', 'Друг подключился!');
        switchToChatMode();
      });

      peer.on('error', (err) => {
        console.error('Peer error', err);
        if (err.type === 'peer-unavailable') {
          alert('Не удалось подключиться к указанному ID. Возможно, друг не в сети.');
        } else {
          alert('Ошибка: ' + err);
        }
      });

      peer.on('disconnected', () => {
        updateStatus('disconnected', 'Соединение потеряно');
        switchToInviteMode();
        peer.reconnect();
      });
    }

    function setupConnectionHandlers() {
      if (!conn) return;
      conn.on('open', () => {
        connected = true;
        updateStatus('connected', '🟢 Соединение активно');
        switchToChatMode();
      });

      conn.on('data', (data) => {
        if (typeof data === 'string') {
          addMessage(data, 'in');
        }
      });

      conn.on('close', () => {
        connected = false;
        conn = null;
        updateStatus('disconnected', 'Соединение закрыто');
        switchToInviteMode();
      });
    }

    function connectToPeer(remoteId) {
      if (!peer) { initPeer(); }
      if (conn) conn.close();
      const connection = peer.connect(remoteId, { reliable: true });
      conn = connection;
      setupConnectionHandlers();
      updateStatus('connecting', 'Подключение...');
    }

    // ---------- Статус и UI ----------
    function updateStatus(type, text) {
      statusText.textContent = text;
      statusDot.className = 'status-dot';
      if (type === 'connected') statusDot.classList.add('online');
      else if (type === 'connecting') statusDot.classList.add('connecting');
    }

    function switchToChatMode() {
      invitePanel.classList.add('hidden');
      chatPanel.classList.remove('hidden');
    }

    function switchToInviteMode() {
      invitePanel.classList.remove('hidden');
      chatPanel.classList.add('hidden');
    }

    // ---------- Сообщения ----------
    function addMessage(text, direction) {
      const msg = {
        text: text,
        direction: direction,
        time: new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
      };
      chatHistory.push(msg);
      renderMessages();
    }

    function renderMessages() {
      if (chatHistory.length === 0) {
        messagesContainer.innerHTML = '<div class="empty-chat">💬 Напишите что-нибудь...</div>';
        return;
      }
      let html = '';
      chatHistory.forEach(msg => {
        const bubbleClass = msg.direction === 'out' ? 'out' : 'in';
        html += `<div class="message ${bubbleClass}">
          <div class="bubble">${escapeHtml(msg.text)}</div>
          <div class="msg-time">${msg.time}</div>
        </div>`;
      });
      messagesContainer.innerHTML = html;
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      if (!conn || !connected) {
        alert('Нет активного соединения');
        return;
      }
      conn.send(text);
      addMessage(text, 'out');
      messageInput.value = '';
    }

    // ---------- Генерация ссылки-приглашения ----------
    function getInviteLink() {
      const base = window.location.origin + window.location.pathname;
      return `${base}?peer=${myPeerId}`;
    }

    function copyInviteLink() {
      if (!myPeerId) { alert('Подождите, генерируется ID...'); return; }
      const link = getInviteLink();
      navigator.clipboard.writeText(link).then(() => {
        alert('✅ Ссылка скопирована! Отправь другу.');
      }).catch(() => {
        prompt('Скопируй вручную:', link);
      });
    }

    // ---------- Обработчики ----------
    connectBtn.addEventListener('click', () => {
      let remote = remoteIdInput.value.trim();
      if (!remote) { alert('Введите ID или ссылку'); return; }
      // Если вставлена полная ссылка, извлекаем peer ID
      if (remote.includes('?peer=')) {
        const url = new URL(remote);
        remote = url.searchParams.get('peer');
      }
      if (!remote) return;
      connectToPeer(remote);
    });

    copyInviteBtn.addEventListener('click', copyInviteLink);
    copyLinkBtn.addEventListener('click', copyInviteLink);

    resetConnectionBtn.addEventListener('click', () => {
      if (conn) conn.close();
      if (peer) peer.destroy();
      chatHistory = [];
      renderMessages();
      initPeer();
      switchToInviteMode();
      remoteIdInput.value = '';
      updateStatus('waiting', 'Ожидаем друга...');
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Копирование при клике на ID
    myPeerIdDisplay.addEventListener('click', () => {
      if (myPeerId) {
        navigator.clipboard.writeText(myPeerId);
        alert('ID скопирован');
      }
    });
    myPeerIdDisplay.style.cursor = 'pointer';

    // ---------- Старт ----------
    initPeer();

    // Авто-подключение, если в URL есть параметр peer
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const remote = params.get('peer');
      if (remote) {
        remoteIdInput.value = remote;
        // небольшая задержка чтобы peer успел открыться
        setTimeout(() => {
          if (myPeerId && remote !== myPeerId) connectToPeer(remote);
        }, 600);
      }
    });
  })();
</script>
</body>
</html>
